    <script>
        // this function is used to check current theme before page loaded.
        (() => {
            const pagebody = document.getElementsByTagName('body')[0]

            function setTheme(status) {
                if (status === 'dark') {
                    pagebody.classList.add('dark-theme');
                    pagebody.classList.remove('light-theme');
                } else if (status === 'light') {
                    pagebody.classList.add('light-theme');
                    pagebody.classList.remove('dark-theme');
                }
            }

            function getSavedTheme() {
                try {
                    return localStorage.getItem('theme');
                } catch (error) {
                    console.log(error);
                    return null;
                }
            }

            function getBrowserTheme() {
                try {
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                } catch (error) {
                    console.log(error);
                    return 'light';
                }
            }

            const savedTheme = getSavedTheme();
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme(getBrowserTheme());
            }
        })();
    </script>

    <script>
        // 子菜单展开/折叠功能
        const parentItems = document.querySelectorAll('.menu-item[data-has-subnav]');
        parentItems.forEach(item => {
            const arrow = item.querySelector('.arrow-icon');
            const subnav = document.querySelector('.subnav-wrapper[data-parent="' + item.getAttribute('data-nav-key') + '"]');
            
            if (arrow && subnav) {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isHidden = subnav.classList.contains('hidden');
                    
                    // 先关闭所有其他子菜单
                    document.querySelectorAll('.subnav-wrapper').forEach(el => {
                        if (el !== subnav) {
                            el.classList.add('hidden');
                            const otherArrow = document.querySelector('.menu-item[data-nav-key="' + el.getAttribute('data-parent') + '"] .arrow-icon');
                            if (otherArrow) {
                                otherArrow.style.transform = 'rotate(0deg)';
                            }
                        }
                    });
                    
                    // 切换当前子菜单
                    if (isHidden) {
                        subnav.classList.remove('hidden');
                        arrow.style.transform = 'rotate(180deg)';
                    } else {
                        subnav.classList.add('hidden');
                        arrow.style.transform = 'rotate(0deg)';
                    }
                });
            }
        });

        // 移动端子菜单展开/折叠
        const mobileParentItems = document.querySelectorAll('.mobile-menu-item[data-has-subnav]');
        mobileParentItems.forEach(item => {
            const arrow = item.querySelector('.arrow-icon');
            const subnav = document.querySelector('.mobile-subnav-wrapper[data-parent="' + item.getAttribute('data-nav-key') + '"]');
            
            if (arrow && subnav) {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isHidden = subnav.classList.contains('hidden');
                    
                    // 先关闭所有其他子菜单
                    document.querySelectorAll('.mobile-subnav-wrapper').forEach(el => {
                        if (el !== subnav) {
                            el.classList.add('hidden');
                            const otherArrow = document.querySelector('.mobile-menu-item[data-nav-key="' + el.getAttribute('data-parent') + '"] .arrow-icon');
                            if (otherArrow) {
                                otherArrow.style.transform = 'rotate(0deg)';
                            }
                        }
                    });
                    
                    // 切换当前子菜单
                    if (isHidden) {
                        subnav.classList.remove('hidden');
                        arrow.style.transform = 'rotate(180deg)';
                    } else {
                        subnav.classList.add('hidden');
                        arrow.style.transform = 'rotate(0deg)';
                    }
                });
            }
        });

        // 点击其他地方关闭子菜单
        document.addEventListener('click', function() {
            document.querySelectorAll('.subnav-wrapper').forEach(subnav => {
                subnav.classList.add('hidden');
            });
            document.querySelectorAll('.arrow-icon').forEach(arrow => {
                arrow.style.transform = 'rotate(0deg)';
            });
            
            document.querySelectorAll('.mobile-subnav-wrapper').forEach(subnav => {
                subnav.classList.add('hidden');
            });
            document.querySelectorAll('.mobile-arrow-icon').forEach(arrow => {
                arrow.style.transform = 'rotate(0deg)';
            });
        });

        // 阻止子菜单点击冒泡
        document.querySelectorAll('.subnav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });

        document.querySelectorAll('.mobile-subnav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    </script>
