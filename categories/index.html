    <script>
        // this function is used to check current theme before page loaded.
        (() => {
            const pagebody = document.getElementsByTagName('body')[0]

            function setTheme(status) {
                if (status === 'dark') {
                    pagebody.classList.add('dark-theme');
                    pagebody.classList.remove('light-theme');
                } else if (status === 'light') {
                    pagebody.classList.add('light-theme');
                    pagebody.classList.remove('dark-theme');
                }
            }

            function getSavedTheme() {
                try {
                    return localStorage.getItem('theme');
                } catch (error) {
                    console.log(error);
                    return null;
                }
            }

            function getBrowserTheme() {
                try {
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                } catch (error) {
                    console.log(error);
                    return 'light';
                }
            }

            const savedTheme = getSavedTheme();
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme(getBrowserTheme());
            }
        })();
    </script>

    <script>
        const navItems = document.querySelectorAll('.subnav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                window.location.href = href;
            });
        });

        
        const mobileNavItems = document.querySelectorAll('.mobile-subnav-item');
        mobileNavItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                window.location.href = href;
            });
        });
        

        // 移动端菜单折叠功能
        const navbarMenu = document.getElementById('navbar-menu');
        const navbarMobile = document.getElementById('navbar-mobile');
        
        // 点击主菜单项时，移动端菜单自动折叠
        const mainMenuItems = document.querySelectorAll('.menu-item:not([data-has-subnav])');
        mainMenuItems.forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    navbarMobile.classList.remove('active');
                }
            });
        });

        // 切换主题函数
        function toggleTheme() {
            const pagebody = document.getElementsByTagName('body')[0];
            const isDark = pagebody.classList.contains('dark-theme');
            const newTheme = isDark ? 'light' : 'dark';
            
            pagebody.classList.toggle('dark-theme');
            pagebody.classList.toggle('light-theme');
            
            try {
                localStorage.setItem('theme', newTheme);
            } catch (error) {
                console.log(error);
            }
            
            // 更新图标
            const iconMoon = document.querySelectorAll('.icon-moon');
            const iconSun = document.querySelectorAll('.icon-sun');
            
            if (isDark) {
                iconMoon.forEach(icon => icon.style.display = 'inline');
                iconSun.forEach(icon => icon.style.display = 'none');
            } else {
                iconMoon.forEach(icon => icon.style.display = 'none');
                iconSun.forEach(icon => icon.style.display = 'inline');
            }
        }
    </script>
