# Hexo Configuration
title: 素心客 | Soulthinker M
subtitle: ''
description: '素心客 | Soulthinker - 思考与记录的空间'
keywords: '博客，素心客，Soulthinker，随笔，研究日志'
author: 素心客 | Soulthinker
language: zh-CN
timezone: Asia/Shanghai

# URL
url: http://example.com
root: /
permalink: :year/:month/:day/:lang/:title/
permalink_defaults:
  lang: zh-CN

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  人生游戏化: Life-Gamification
  人生拆迁: Life-Demolition
  研究日志: Research
  随笔: Essays
tag_map:

# Date / Time format
date_format: YYYY/MM/DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: custom-theme

# Deployment
deploy:
  type: ''

# Custom settings for multilingual support
multilingual:
  enable: true
  languages:
    - zh-CN
    - en
